name: museCraft CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  # ── 1단계: CI (빌드 + 테스트) ──────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew build -x bootJar --no-daemon

  # ── 2단계: CD (Docker 빌드 + EC2 배포) — main 브랜치만 ────────
  cd:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        service: [gateway, user-service, brand-service, subscription-service, settlement-service, notification-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: |
          chmod +x gradlew
          ./gradlew :${{ matrix.service }}:bootJar -x test --no-daemon

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/musecraft-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/musecraft-${{ matrix.service }}:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/musecraft-${{ matrix.service }}:latest
            docker stop musecraft-${{ matrix.service }} || true
            docker rm musecraft-${{ matrix.service }} || true
            docker run -d \
              --name musecraft-${{ matrix.service }} \
              --network musecraft-network \
              --env-file /home/ubuntu/musecraft/.env \
              ${{ secrets.DOCKER_USERNAME }}/musecraft-${{ matrix.service }}:latest
            echo "${{ matrix.service }} 배포 완료"
